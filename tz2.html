<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовое задание №2</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #343a40;
            color: #fff;
            padding: 20px;
        }
        .content-block {
            background-color: #495057;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .image-item {
            width: 100%;
            height: 150px;
            overflow: hidden;
            background-color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .jumbotron {
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: #e9ecef;
            border-radius: .3rem;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            padding-top: 100px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.9);
        }
        .modal-content {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
        }
        .close {
            position: absolute;
            top: 15px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-azure {
            background-color: #5D9CEC;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 5px;
        }
        .btn-cupit {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 5px;
        }
        .pagination {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        .page-numbers {
            display: flex;
            margin-bottom: 10px;
        }
        .page-numbers button {
            background-color: #B399D4;
            color: white;
            border: none;
            padding: 8px 16px;
            margin: 0 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        .page-numbers button.active {
            background-color: #7D6E98; 
            cursor: default; 
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-block">
            <div class="row justify-content-center mb-3">
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="text" id="search" class="form-control" placeholder="Search for images..."
                            	onkeydown="handleKeyDown(event)">
                        <div class="input-group-append">
                            <button class="btn btn-primary" onclick="searchImages()">Search</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row" id="images"></div>
            <div class="pagination">
                <div class="page-numbers" id="pageNumbers"></div>
                <div>
                    <button class="btn btn-azure" onclick="prevPage()">Previous</button>
                    <button class="btn btn-cupit" onclick="nextPage()">Next</button>
                </div>
            </div>
        </div>
    </div>
    <div id="imageModal" class="modal">
        <span class="close" onclick="document.getElementById('imageModal').style.display='none'">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>
    <!-- Подключение jQuery, Popper.js и Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        const accessKey = 'rvwTAzvH3QEoQIzPStuDu2oYaHUXzmzVfQPVfyuQQKM';
        let currentPage = 1;
        let currentSearchQuery = '';
        let imagesPerPage = 16;
        let totalPages = 1000; // ограничение от API
        let pagesPerView = 10;

        async function fetchImages(page, query = '') {
            try {
                const url = query
                    ? `https://api.unsplash.com/search/photos?page=${page}&query=${query}&per_page=${imagesPerPage}&client_id=${accessKey}`
                    : `https://api.unsplash.com/photos?page=${page}&per_page=${imagesPerPage}&client_id=${accessKey}`;
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const images = query ? data.results : data;
                displayImages(images);
                updatePagination();
            } catch (error) {
                console.error("Error fetching images:", error);
            }
        }

        function displayImages(images) {
            const imagesContainer = document.getElementById('images');
            imagesContainer.innerHTML = '';
            images.forEach(image => {
                const imgWrapper = document.createElement('div');
                imgWrapper.className = 'col-lg-3 col-md-4 col-sm-6 mb-4';
                imgWrapper.innerHTML = `
                    <div class="jumbotron">
                        <div class="image-item" onclick="openImageModal('${image.urls.regular}')">
                            <img src="${image.urls.small}" alt="${image.alt_description || 'Image'}">
                        </div>
                    </div>
                `;
                imagesContainer.appendChild(imgWrapper);
            });
        }

        function openImageModal(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'block';
            modalImg.src = imageUrl;
        }

        function updatePagination() {
            const pageNumbers = document.getElementById('pageNumbers');
            pageNumbers.innerHTML = '';
            let startPage = Math.max(1, currentPage - Math.floor(pagesPerView / 2));
            let endPage = Math.min(totalPages, startPage + pagesPerView - 1);
            if (endPage - startPage + 1 < pagesPerView) {
                startPage = Math.max(1, endPage - pagesPerView + 1);
            }
            for (let i = startPage; i <= endPage; i++) {
                const pageButton = document.createElement('button');
                pageButton.className = `btn ${i === currentPage ? 'active' : ''}`;
                pageButton.textContent = i;
                pageButton.onclick = function() {
                    currentPage = i;
                    fetchImages(currentPage, currentSearchQuery);
                };
                pageNumbers.appendChild(pageButton);
            }
        }

        function searchImages() {
            currentSearchQuery = document.getElementById('search').value;
            currentPage = 1;
            fetchImages(currentPage, currentSearchQuery);
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                fetchImages(currentPage, currentSearchQuery);
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                fetchImages(currentPage, currentSearchQuery);
            }
        }
        
        function handleKeyDown(event) {
    	    if (event.key === 'Enter') {
        	searchImages();
    	    }
	}

        fetchImages(currentPage);
    </script>
</body>
</html>
