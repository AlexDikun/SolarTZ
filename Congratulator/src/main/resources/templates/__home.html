<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Дни рождения</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .birthday-card {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background-color: #f8f9fa;
        }
        .date-label {
            font-size: 1.1rem;
            font-weight: 600;
            color: #0d6efd;
            margin-bottom: 8px;
        }
        .person-item {
            padding: 6px 0;
            border-bottom: 1px dashed #e9ecef;
        }
        .person-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <!-- Заголовок -->
        <h1 class="mb-4 text-center" th:text="${periodTitle}"></h1>


        <!-- Сообщение, если нет дней рождения -->
        <div th:if="${#lists.isEmpty(birthdays)}" class="alert alert-info text-center">
            На этой неделе нет дней рождения.
        </div>

        <!-- Контейнеры с днями рождения -->
        <div th:if="${not #lists.isEmpty(birthdays)}">
            <div th:each="event : ${birthdays}" class="birthday-card">
                <!-- Дата -->
                <div class="date-label" 
                     th:text="${#temporals.format(event.date, 'd MMMM', 'ru') + ' (' + #temporals.format(event.date, 'EEEE', 'ru') + ')'}">
                </div>

                <!-- Список людей -->
                <div>
                    <div th:each="person : ${event.persons}" class="person-item">
                        <strong th:text="${person.firstName} + ' ' + ${person.lastName}"></strong>
                        <span th:if="${person.position != null}"
                              th:text="' (' + person.position + ')'"
                              class="text-muted"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
