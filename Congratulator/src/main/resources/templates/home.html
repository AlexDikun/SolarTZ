<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Поздравлятор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4 text-center" th:text="${periodTitle}"></h1>

        <div th:if="${#lists.isEmpty(birthdays)}" class="alert alert-info text-center">
            На этой неделе нет дней рождения.
        </div>

        <div th:if="${not #lists.isEmpty(birthdays)}">
            <div th:each="event : ${birthdays}" class="birthday-card">
                <div class="date-label"
                     th:text="${#temporals.format(event.date, 'd MMMM') + ' (' + #temporals.format(event.date, 'EEEE') + ')'}">
                </div>

                <div>
                    <div th:each="person : ${event.persons}" class="person-item">
                        <strong th:text="${person.firstName + ' ' + person.lastName}"></strong>
                        <span th:if="${person.position != null}"
                              th:text="' (' + person.position + ')'"
                              class="text-muted"></span>
                        <img
                            th:if="${person.photoFileName}"
                            th:src="@{/photos/{fileName}(fileName=${person.photoFileName})}"
                            width="50"
                            height="50"
                            class="ms-2 rounded-circle"
                        />
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/all}" class="btn btn-primary me-2">Все дни рождения</a>
            <a th:href="@{/add}" class="btn btn-secondary">Добавить запись</a>
        </div>
    </div>
</body>
</html>
