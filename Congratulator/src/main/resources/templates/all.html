<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все дни рождения</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Все дни рождения</h1>

        <div th:each="event : ${birthdays}" class="birthday-card">
            <div class="date-label"
                 th:text="${#temporals.format(event.date, 'd MMMM') + ' (' + #temporals.format(event.date, 'EEEE') + ')'}">
            </div>

            <div>
                <div th:each="person : ${event.persons}" class="person-item">
                    <strong th:text="${person.firstName + ' ' + person.lastName}"></strong>
                    <span th:if="${person.position != null}"
                          th:text="' (' + person.position + ')'"
                          class="text-muted"></span>
                    <img
                        th:if="${person.photoFileName}"
                        th:src="@{/photos/{fileName}(fileName=${person.photoFileName})}"
                        width="50"
                        height="50"
                        class="ms-2 rounded-circle"
                    />
                    <a th:href="@{/edit/{id}(id=${person.id})}" class="btn btn-sm btn-outline-primary ms-2">Редактировать</a>
                    <a th:href="@{/delete/{id}(id=${person.id})}" class="btn btn-sm btn-outline-danger">Удалить</a>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-secondary me-2">На главную</a>
            <a th:href="@{/add}" class="btn btn-primary">Добавить запись</a>
        </div>
    </div>
</body>
</html>
