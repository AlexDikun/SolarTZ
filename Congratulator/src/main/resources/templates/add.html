<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить запись</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Добавить запись</h1>

        <form
            th:action="@{/add}"
            th:object="${person}"
            method="post"
            enctype="multipart/form-data"
        >
            <div class="mb-3">
                <label class="form-label">Имя:</label>
                <input type="text" class="form-control" th:field="*{firstName}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Фамилия:</label>
                <input type="text" class="form-control" th:field="*{lastName}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" class="form-control" th:field="*{email}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Дата рождения:</label>
                <input type="date" class="form-control" th:field="*{birthDate}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Должность:</label>
                <select class="form-select" th:field="*{position}" required>
                    <option th:each="pos : ${positions}" th:value="${pos}" th:text="${pos}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Фотография:</label>
                <input type="file" class="form-control" name="file" />
            </div>
            <button type="submit" class="btn btn-primary">Добавить</button>
        </form>

        <div class="mt-3">
            <a th:href="@{/}" class="btn btn-secondary">На главную</a>
        </div>
    </div>
</body>
</html>
