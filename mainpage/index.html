<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Джанго Спасенный — Отдам в добрые руки</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container">
            <h1 class="logo">Джанго Спасенный</h1>
            <div class="auth-block">
                <button class="auth-button">Войти</button>
            </div>
            <div class="search-block">
                <input type="text" class="search-input" placeholder="Поиск животных...">
                <button class="search-button">Найти</button>
            </div>
            <div class="category-block">
                <select class="category-select">
                    <option value="">Выберите категорию</option>
                    <option value="cats">Кошки</option>
                    <option value="dogs">Собаки</option>
                    <option value="rodents">Грызуны</option>
                    <option value="birds">Птицы</option>
                    <option value="other">Другие</option>
                </select>
            </div>
        </div>
    </header>
    <br>
    
    <!-- Мейн -->
    <main class="main">
        <div class="container">
            <div class="ads-grid">
                <!-- Первое объявление -->
                <div class="ad-card">
                    <div class="ad-image">
                        <img src="images/" alt="Фото животного">
                    </div>
                    <div class="ad-info">
                        <h3 class="ad-title">Текст заголовка</h3>
                        <p class="ad-description">Комментарий.</p>
                        <p class="ad-price">Бесплатно</p>
                    </div>
                </div>
                <!-- Второе объявление-->
                <div class="ad-card">
                    <div class="ad-image">
                        <img src="images/" alt="Фото животного">
                    </div>
                    <div class="ad-info">
                        <h3 class="ad-title">Текст заголовка</h3>
                        <p class="ad-description">Комментарий</p>
                        <p class="ad-price">5 000 ₽</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="footer">
        <div class="container">
            <p class="copyright">© 2025 Джанго Спасенный. Все права защищены.</p>
            <div class="contacts">
                <p>Алекс Дикун</p>
                <p>ул. Пушкина, д. Колотушкина</p>
                <p>8 800 555 35 35</p>
            </div>
        </div>
    </footer>
</body>
</html>
