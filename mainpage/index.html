<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Джанго Спасенный — Отдам в добрые руки</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="container">
            <!-- Лого и категория -->
            <div class="header-left">
                <a href="#" class="logo-link">
                    <img src="images/logo.jpg" alt="Джанго Спасенный" class="logo">
                </a>
                <div class="category-block">
                    <select class="category-select">
                        <option value="">Все категории</option>
                        <option value="cats">Кошки</option>
                        <option value="dogs">Собаки</option>
                        <option value="rodents">Грызуны</option>
                        <option value="birds">Птицы</option>
                        <option value="other">Другие</option>
                    </select>
                </div>
            </div>

            <!-- Поиск -->
            <div class="header-center">
                <div class="search-block">
                    <input type="text" class="search-input" placeholder="Поиск животных...">
                    <button class="search-button">Найти</button>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="header-right">
                <button class="auth-button">Войти</button>
                <button class="add-ad-button">Новое объявление</button>
            </div>
        </div>
    </header>

    <!-- Мейн -->
    <main class="main">
        <div class="container">
            <div class="ads-grid" id="adsGrid">
                <!-- Первое объявление -->
                <div class="ad-card">
                    <div class="ad-image">
                        <img src="images/littleDog.jpg" alt="Фото животного">
                    </div>
                    <div class="ad-info">
                        <h3 class="ad-title">Отдам щенка!</h3>
                        <p class="ad-description">У него недавно был день рождения</p>
                        <p class="ad-price">Бесплатно</p>
                    </div>
                </div>
                <!-- Второе объявление-->
                <div class="ads-grid">
                    <div class="ad-image">
                        <img src="images/parrot.webp" alt="Фото животного">
                    </div>
                    <div class="ad-info">
                        <h3 class="ad-title">Продам верного друга</h3>
                        <p class="ad-description">Он даже раговаривает немного</p>
                        <p class="ad-price">5 000 ₽</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="footer">
        <div class="container">
            <p class="copyright">© 2025 Джанго Спасенный. Все права защищены.</p>
            <div class="contacts">
                <p>Алекс Дикун</p>
                <p>ул. Пушкина, д. Колотушкина</p>
                <p>8 800 555 35 35</p>
            </div>
        </div>
    </footer>

    <script src="scripts/main.js"></script>
</body>
</html>
