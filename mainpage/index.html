<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Джанго Спасенный — Отдам в добрые руки</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="header">
        <div class="header__container container">
            <div class="header__left">
                <h1 class="header_title">Доска объявлений</h1>
                </a>
                <div class="header__category-block">
                    <select class="header__category-select">
                        <option value="">Все категории</option>
                        <option value="cats">Категория 1</option>
                        <option value="dogs">Категория 2</option>
                        <option value="rodents">Категория 3</option>
                        <option value="birds">Категория 4</option>
                        <option value="other">Категория 5</option>
                    </select>
                </div>
            </div>
            <div class="header__center">
                <div class="header__search-block">
                    <input type="text" class="header__search-input" placeholder="Поиск по объявленим">
                    <button class="header__search-button">Найти</button>
                </div>
            </div>
            <div class="header__right">
                <button class="header__auth-button">Войти</button>
                <button class="header__add-ad-button">Новое объявление</button>
            </div>
        </div>
    </header>

   <main class="main">
        <div class="main__container container">
            <ul class="ads-grid" id="adsGrid">
                <li class="ad-card">
                    <div class="ad-card__image">
                        <img src="images/littleDog.png" alt="Щенок в праздничной шляпе" class="ad-card__img">
                    </div>
                    <div class="ad-card__info">
                        <h3 class="ad-card__title">Отдам щенка!</h3>
                        <p class="ad-card__description">У него недавно был день рождения</p>
                        <p class="ad-card__price">Бесплатно</p>
                    </div>
                </li>
                <li class="ad-card">
                    <div class="ad-card__image">
                        <img src="images/parrot.png" alt="Мужчина с попугаем" class="ad-card__img">
                    </div>
                    <div class="ad-card__info">
                        <h3 class="ad-card__title">Продам верного друга</h3>
                        <p class="ad-card__description">Он даже раговаривает немного</p>
                        <p class="ad-card__price">5 000 ₽</p>
                    </div>
                </li>
            </ul>
        </div>
    </main>

    <footer class="footer">
        <div class="footer__container container">
            <p class="footer__copyright">© 2025 Джанго Спасенный. Все права защищены.</p>
            <div class="footer__contacts">
                <p class="footer__contact-text">Алекс Дикун</p>
                <p class="footer__contact-text">ул. Пушкина, д. Колотушкина</p>
                <p class="footer__contact-text">8 800 555 35 35</p>
            </div>
        </div>
    </footer>
    
    <script src="scripts/main.js"></script>
</body>
</html>
